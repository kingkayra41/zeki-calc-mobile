name: Build Flet APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3'ten v4'e güncellendi

      - name: Set up Python
        uses: actions/setup-python@v5 # v4'ten v5'e güncellendi
        with:
          python-version: '3.11'

      - name: Install Flet and Dependencies
        run: |
          pip install flet flet-cli

      - name: Build APK
        run: |
          flet build apk --project-name "MyCoolCalc" --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4 # İŞTE KRİTİK HATA BURADAYDI: v4 yaptık
        with:
          name: my-app-apk
          path: build/apk/*.apk
